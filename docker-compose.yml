version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: equity_portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/equity_portfolio"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "equity-portfolio-secret-key-change-in-production"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
